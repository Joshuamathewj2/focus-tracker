<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0a0e1a"/>
<title>Study Quest — Loading</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#070a14;--cyan:#3ee6d4;--violet:#a78bfa;--gold:#ffc857;--text:#eef1fb;--text2:#8d97bd;
  --fdisp:'Space Grotesk',sans-serif;--fbody:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);width:100%;height:100%;overflow:hidden;}
body{
  font-family:var(--fbody);color:var(--text);
  display:flex;align-items:center;justify-content:center;
  position:relative;
}

/* ===== Ambient deep-space backdrop ===== */
.sky{position:absolute;inset:0;
  background:
    radial-gradient(circle at 20% 18%, rgba(167,139,250,0.16), transparent 38%),
    radial-gradient(circle at 82% 75%, rgba(62,230,212,0.12), transparent 42%),
    radial-gradient(circle at 50% 100%, rgba(255,200,87,0.06), transparent 50%),
    var(--bg);
}
.stars{position:absolute;inset:0;}
.star{position:absolute;border-radius:50%;background:#fff;opacity:0;animation:twinkle 2.4s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0.15;}50%{opacity:0.9;}}

/* ===== Stage ===== */
.stage{position:relative;width:min(92vw,520px);height:min(92vh,640px);display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* Constellation canvas drawn by spark */
.sigil-wrap{position:relative;width:220px;height:220px;margin-bottom:18px;}
svg.sigil{width:100%;height:100%;overflow:visible;}
.sigil-line{
  fill:none;stroke:url(#lineGrad);stroke-width:2.2;stroke-linecap:round;
  stroke-dasharray:600;stroke-dashoffset:600;
  filter:drop-shadow(0 0 6px rgba(62,230,212,0.55));
  animation:draw 1.7s cubic-bezier(0.65,0,0.35,1) forwards;
  animation-delay:0.15s;
}
@keyframes draw{to{stroke-dashoffset:0;}}

.node{opacity:0;animation:nodeIn 0.4s ease-out forwards;}
.node circle{fill:var(--gold);filter:drop-shadow(0 0 8px rgba(255,200,87,0.8));}
@keyframes nodeIn{to{opacity:1;}}

/* spark traveling dot */
.spark{
  position:absolute;width:10px;height:10px;border-radius:50%;
  background:radial-gradient(circle,#fff 0%,var(--cyan) 45%,transparent 80%);
  box-shadow:0 0 18px 6px rgba(62,230,212,0.8),0 0 36px 12px rgba(167,139,250,0.4);
  offset-rotate:0deg;
  animation:travel 1.7s cubic-bezier(0.65,0,0.35,1) forwards, sparkFade 0.4s ease-in forwards;
  animation-delay:0.15s, 1.45s;
  opacity:1;
}

/* sword/seal icon at center, ignites after sigil completes */
.seal{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.3);
  width:64px;height:64px;display:flex;align-items:center;justify-content:center;
  font-size:34px;opacity:0;
  animation:sealPop 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
  animation-delay:1.55s;
}
@keyframes sealPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.2) rotate(-25deg);}
  60%{opacity:1;transform:translate(-50%,-50%) scale(1.25) rotate(8deg);}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0deg);}
}
.seal-ring{
  position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(255,200,87,0.5);
  opacity:0;animation:ringPulse 1.8s ease-out forwards;animation-delay:1.6s;
}
@keyframes ringPulse{
  0%{opacity:0.9;transform:scale(0.6);}
  100%{opacity:0;transform:scale(2.6);}
}

/* Name reveal */
.namewrap{overflow:hidden;}
.name{
  font-family:var(--fdisp);font-weight:800;
  font-size:clamp(34px,9vw,52px);letter-spacing:0.04em;
  display:flex;justify-content:center;
}
.name span{
  display:inline-block;opacity:0;transform:translateY(28px);filter:blur(6px);
  background:linear-gradient(180deg,#ffffff 0%, var(--cyan) 60%, var(--violet) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:letterUp 0.65s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes letterUp{to{opacity:1;transform:translateY(0);filter:blur(0);}}

.tagline{
  margin-top:10px;font-size:13px;font-weight:600;color:var(--text2);
  letter-spacing:0.14em;text-transform:uppercase;
  opacity:0;animation:fadeUp 0.7s ease-out forwards;animation-delay:2.7s;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* presents-style eyebrow */
.eyebrow{
  font-size:11px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--text2);
  opacity:0;animation:fadeUp 0.6s ease-out forwards;animation-delay:0s;
  margin-bottom:6px;
}

/* loading bar at the very end */
.loadbar-wrap{
  margin-top:26px;width:200px;height:4px;border-radius:3px;background:rgba(255,255,255,0.08);overflow:hidden;
  opacity:0;animation:fadeUp 0.5s ease-out forwards;animation-delay:2.9s;
}
.loadbar{
  height:100%;border-radius:3px;width:0%;
  background:linear-gradient(90deg,var(--cyan),var(--violet));
  animation:fill 1.4s cubic-bezier(0.4,0,0.2,1) forwards;animation-delay:3.0s;
}
@keyframes fill{to{width:100%;}}
.loadlbl{
  margin-top:8px;font-size:10px;font-weight:700;letter-spacing:0.08em;color:var(--text2);
  opacity:0;animation:fadeUp 0.5s ease-out forwards;animation-delay:3.0s;
}

/* Whole stage fade-out to hand off to tracker */
.curtain{
  position:fixed;inset:0;background:var(--bg);opacity:0;pointer-events:none;z-index:50;
  animation:curtainIn 0.6s ease-in forwards;animation-delay:4.3s;
}
@keyframes curtainIn{to{opacity:1;}}

.skip{
  position:fixed;bottom:18px;right:18px;z-index:60;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);
  color:var(--text2);font-family:var(--fbody);font-size:11px;font-weight:700;
  padding:7px 14px;border-radius:20px;cursor:pointer;letter-spacing:0.04em;
  opacity:0;animation:fadeUp 0.5s ease-out forwards;animation-delay:1s;
}
.skip:hover{color:var(--text);border-color:var(--cyan);}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms !important;animation-delay:0ms !important;}
}
</style>
</head>
<body>

<div class="sky"></div>
<div class="stars" id="stars"></div>

<button class="skip" id="skipBtn" onclick="finish()">Skip ›</button>

<div class="stage">
  <div class="eyebrow">A Study Quest Production</div>

  <div class="sigil-wrap">
    <svg class="sigil" viewBox="0 0 220 220">
      <defs>
        <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#3ee6d4"/>
          <stop offset="100%" stop-color="#a78bfa"/>
        </linearGradient>
      </defs>
      <!-- six-point star / compass sigil path, drawn by the spark -->
      <path class="sigil-line" d="M110,20 L150,90 L195,95 L150,130 L165,195 L110,160 L55,195 L70,130 L25,95 L70,90 Z"/>
      <g class="node" style="animation-delay:0.25s"><circle cx="110" cy="20" r="4"/></g>
      <g class="node" style="animation-delay:0.55s"><circle cx="195" cy="95" r="4"/></g>
      <g class="node" style="animation-delay:0.85s"><circle cx="165" cy="195" r="4"/></g>
      <g class="node" style="animation-delay:1.15s"><circle cx="55" cy="195" r="4"/></g>
      <g class="node" style="animation-delay:1.45s"><circle cx="25" cy="95" r="4"/></g>
    </svg>
    <div class="spark" id="spark"></div>
    <div class="seal">
      <div class="seal-ring"></div>
      ⚔️
    </div>
  </div>

  <div class="namewrap">
    <div class="name" id="nameTarget"></div>
  </div>
  <div class="tagline">Level up your studies</div>

  <div class="loadbar-wrap"><div class="loadbar"></div></div>
  <div class="loadlbl">Entering the quest…</div>
</div>

<div class="curtain"></div>

<script>
/* Build the spark's travel path to match the sigil exactly */
const spark = document.getElementById('spark');
spark.style.offsetPath = "path('M110,20 L150,90 L195,95 L150,130 L165,195 L110,160 L55,195 L70,130 L25,95 L70,90 Z')";
spark.style.offsetDistance = '0%';
spark.style.left = '0';
spark.style.top = '0';
spark.style.animationName = 'sparkMove, sparkFade';
const styleTag = document.createElement('style');
styleTag.textContent = `
@keyframes sparkMove{ from{ offset-distance: 0%; } to{ offset-distance: 100%; } }
@keyframes sparkFade{ to{ opacity:0; } }
.spark{ animation-timing-function: cubic-bezier(0.65,0,0.35,1), ease-in; animation-duration:1.7s,0.4s; animation-delay:0.15s,1.45s; animation-fill-mode:forwards; }
`;
document.head.appendChild(styleTag);

/* Letter-by-letter name reveal */
const NAME = "JESWIN";
const target = document.getElementById('nameTarget');
[...NAME].forEach((ch,i)=>{
  const span = document.createElement('span');
  span.textContent = ch;
  span.style.animationDelay = (1.85 + i*0.09) + 's';
  target.appendChild(span);
});

/* Scatter ambient stars */
const starsWrap = document.getElementById('stars');
for(let i=0;i<60;i++){
  const s = document.createElement('div');
  s.className='star';
  const size = Math.random()*2+0.6;
  s.style.width = size+'px';
  s.style.height = size+'px';
  s.style.left = Math.random()*100+'%';
  s.style.top = Math.random()*100+'%';
  s.style.animationDelay = (Math.random()*2.4)+'s';
  s.style.animationDuration = (1.8+Math.random()*2)+'s';
  starsWrap.appendChild(s);
}

/* Hand off to the tracker after the sequence (or on click/skip) */
let handed = false;
function finish(){
  if(handed) return;
  handed = true;
  document.body.style.transition = 'opacity 0.5s ease';
  document.body.style.opacity = '0';
  setTimeout(()=>{
    // Change this redirect target to your tracker file/page if hosted separately
    window.location.href = 'index.html';
  }, 480);
}
setTimeout(finish, 4900);
document.querySelector('.stage').addEventListener('click', finish);
</script>
</body>
</html>
